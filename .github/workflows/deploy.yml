# Trigger deployment after setting up FTP secrets
name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🚀 Deploy Website
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install NPM packages & Build
      run: |
        npm install
        npm run build

    - name: ⚙️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, mysql, zip

    - name: 📦 Install Composer dependencies
      run: composer install --no-dev --optimize-autoloader --prefer-dist

    - name: 📂 Sync files to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: public_html/
        dangerous-clean-slate: false
        timeout: 60000
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.github/**
          .env
          .env.example
          .env.production
          README.md
          DEPLOYMENT.md
          FINALIZATION_SUMMARY.md
          QUICKSTART.md
          DOCUMENTATION.md
          CHECKLIST.md
          tests/**
          phpunit.xml
          install.bat
          install.sh
          temp_script.txt
